<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Sensor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <header>
        <div id="header-left-content"><a href="home.html">Home</a></div>
        <div id="header-right-content">
            <button id="settings-button">Settings</button>
        </div>
    </header>
    <main>
        <div id="settings-window">
            <div id="setting-content">
                <div>
                    <p>Switch to F from C</p>
                    <label class="switch" >
                        <input id="switchbtn" type="checkbox" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="content">

            <div id="chart-container">
                <h1>DIY Sensor</h1>

                <div id="chart">

                    <canvas id="sensor"></canvas>
                </div>
            </div>
            <div id="data-card-container">
                <div>
                    <p>Temperature</p>
                    <p id="temperature"></p>
                </div>
               
                <div>
                    <p>Humidity</p>
                    <p id="humidity"></p>
                </div>
                <div id="timestamp"> 
                <p id="recent_timestamp">Last reading: </p>
                </div>
            </div>
            

        </div>
    </main>
    <script type="module" src="script.js" defer></script>


</body>

</html>
